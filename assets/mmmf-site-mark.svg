      <stop offset="0" stop-color="#1E2B41"/>
      <stop offset="1" stop-color="#111A2A"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E4463" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#1E2B41" stop-opacity="0.08"/>

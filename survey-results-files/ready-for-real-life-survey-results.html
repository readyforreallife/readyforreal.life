<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Printable Survey Results PDF | Ready for Real Life</title>
    <style>
      :root {
        --ink: #0e1118;
        --paper: #f6f3ec;
        --slate: #253044;
        --rule: #ddd7cc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--paper);
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .survey-doc-nav {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        justify-content: center;
        gap: 10px;
        padding: max(12px, env(safe-area-inset-top)) 16px 12px;
        background: rgba(246, 243, 236, 0.96);
        border-bottom: 1px solid var(--rule);
        backdrop-filter: blur(10px);
      }

      .survey-doc-nav a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        border-radius: 999px;
        padding: 0 18px;
        background: var(--slate);
        color: #f7f3ec;
        font-size: 14px;
        font-weight: 800;
        text-decoration: none;
      }

      .survey-doc-nav a.secondary {
        background: #fff;
        color: var(--slate);
        border: 1px solid var(--rule);
      }

      .pdf-shell {
        width: min(100%, 1100px);
        margin: 0 auto;
        padding: 16px;
      }

      .pdf-frame {
        width: 100%;
        min-height: calc(100vh - 96px);
        border: 1px solid var(--rule);
        border-radius: 8px;
        background: #fff;
      }

      .fallback {
        margin: 12px 0 0;
        color: #697080;
        font-size: 14px;
        line-height: 1.5;
        text-align: center;
      }

      .fallback a {
        color: var(--slate);
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <nav class="survey-doc-nav" aria-label="Survey packet navigation">
      <a href="../survey-results.html" data-survey-back>Back to Survey Results</a>
      <a class="secondary" href="ready-for-real-life-survey-results.pdf">Download PDF</a>
    </nav>
    <main class="pdf-shell">
      <iframe
        class="pdf-frame"
        title="Ready for Real Life survey results PDF"
        src="ready-for-real-life-survey-results.pdf"
      ></iframe>
      <p class="fallback">
        If the PDF does not appear on this device,
        <a href="ready-for-real-life-survey-results.pdf">open the file directly</a>.
      </p>
    </main>
    <script>
      document.querySelector("[data-survey-back]")?.addEventListener("click", (event) => {
        if (window.history.length > 1) {
          event.preventDefault();
          window.history.back();
        }
      });
    </script>
  </body>
</html>

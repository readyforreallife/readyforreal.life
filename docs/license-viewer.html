<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business License Viewer | Ready for Real Life</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600;800&display=swap");

      :root {
        --ink: #111827;
        --muted: #6b7280;
        --paper: #f7f3ec;
        --line: #ded7ca;
        --gold: #c89540;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--paper);
        color: var(--ink);
        font-family: "DM Sans", sans-serif;
      }

      .viewer-header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: max(14px, env(safe-area-inset-top)) 18px 14px;
        border-bottom: 1px solid var(--line);
        background: rgba(247, 243, 236, 0.96);
        backdrop-filter: blur(14px);
      }

      .viewer-title {
        min-width: 0;
      }

      .viewer-label {
        margin: 0 0 4px;
        color: var(--gold);
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        overflow-wrap: anywhere;
        font-family: "Playfair Display", serif;
        font-size: clamp(1.15rem, 4vw, 1.7rem);
      }

      .viewer-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      .viewer-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        color: var(--ink);
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
      }

      .viewer-btn.primary {
        border-color: var(--ink);
        background: var(--ink);
        color: #fff;
      }

      .viewer-frame {
        width: 100%;
        height: calc(100vh - 86px);
        min-height: 620px;
        border: 0;
        background: #fff;
      }

      .viewer-fallback {
        padding: 18px;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .viewer-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .viewer-actions {
          width: 100%;
          justify-content: flex-start;
        }

        .viewer-btn {
          flex: 1 1 auto;
        }

        .viewer-frame {
          height: calc(100vh - 160px);
          min-height: 520px;
        }
      }
    </style>
  </head>
  <body>
    <header class="viewer-header">
      <div class="viewer-title">
        <p class="viewer-label">Business Documentation</p>
        <h1 id="licenseTitle">Business License</h1>
      </div>
      <nav class="viewer-actions" aria-label="License viewer actions">
        <button class="viewer-btn" type="button" id="backBtn">
          Back to Program
        </button>
        <a class="viewer-btn primary" id="openPdfBtn" href="#">Open PDF</a>
      </nav>
    </header>

    <iframe
      class="viewer-frame"
      id="licenseFrame"
      title="Business license PDF"
    ></iframe>
    <div class="viewer-fallback">
      If the document does not appear, use Back to Program or Open PDF above.
    </div>

    <script>
      const licenses = {
        state: {
          title: "State Sales Tax License",
          file: "assets/docs/legal/state-sales-tax-license.pdf",
        },
        tooele: {
          title: "Tooele City Business License",
          file: "assets/docs/legal/tooele-city-business-license.pdf",
        },
      };

      const params = new URLSearchParams(window.location.search);
      const selected = licenses[params.get("license")] || licenses.state;
      const titleEl = document.getElementById("licenseTitle");
      const frame = document.getElementById("licenseFrame");
      const openPdfBtn = document.getElementById("openPdfBtn");
      const backBtn = document.getElementById("backBtn");

      titleEl.textContent = selected.title;
      frame.src = selected.file + "#view=FitH";
      openPdfBtn.href = selected.file;
      openPdfBtn.target = "_blank";
      openPdfBtn.rel = "noopener";

      backBtn.addEventListener("click", () => {
        if (window.history.length > 1) {
          window.history.back();
          return;
        }
        window.location.href = "index.html";
      });
    </script>
  </body>
</html>

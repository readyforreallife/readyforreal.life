<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#253044" />
    <title>Offline | Ready for Real Life</title>
    <style>
      :root {
        --paper: #f6f3ec;
        --ink: #0e1118;
        --slate: #253044;
        --gold: #c49540;
      }
      * {
        box-sizing: border-box;
      }
      html {
        max-width: 100%;
        overflow-x: hidden;
        overscroll-behavior-x: none;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(
            circle at top,
            rgba(196, 149, 64, 0.2),
            transparent 35%
          ),
          var(--paper);
        color: var(--ink);
        font-family: "DM Sans", system-ui, sans-serif;
        max-width: 100%;
        overflow-x: hidden;
        overscroll-behavior-x: none;
      }
      .card {
        width: min(100%, 560px);
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(37, 48, 68, 0.12);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(37, 48, 68, 0.12);
      }
      .eyebrow {
        margin: 0 0 10px;
        color: var(--gold);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0 0 10px;
        color: var(--slate);
        font-size: clamp(2rem, 6vw, 2.6rem);
        line-height: 1.05;
      }
      p {
        margin: 0 0 18px;
        line-height: 1.6;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }
      .primary {
        background: var(--slate);
        color: #fff;
      }
      .secondary {
        border: 1px solid rgba(37, 48, 68, 0.16);
        color: var(--slate);
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Offline Mode</p>
      <h1>Ready for Real Life is saved on this device.</h1>
      <p>
        You are offline right now, so some live content may not load yet. The
        core app shell is still available, and you can try again as soon as your
        connection returns.
      </p>
      <div class="actions">
        <a class="primary" href="/">Return Home</a>
        <a class="secondary" href="/game.html">Open Challenge Game</a>
      </div>
    </main>
  </body>
</html>
